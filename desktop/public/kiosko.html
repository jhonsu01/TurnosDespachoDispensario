<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiosko de Turnos — Dispensario</title>
<style>
  :root {
    --bg: #0B1117; --panel: #131C25; --texto: #F1F5F9;
    --cian: #22D3EE; --amarillo: #FACC15; --gris: #64748B;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
  body {
    background: var(--bg); color: var(--texto); min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 1.5rem; text-align: center;
  }
  h1 { font-size: 2rem; margin-bottom: .4rem; }
  .sub { color: var(--gris); margin-bottom: 1.6rem; font-size: 1.1rem; }
  .panel { background: var(--panel); border-radius: 18px; padding: 2rem; width: min(560px, 94vw); }
  .doc {
    font-size: 2.4rem; letter-spacing: .2em; background: #0B1117; border-radius: 12px;
    padding: .8rem 1rem; min-height: 4.4rem; margin-bottom: 1.2rem; font-variant-numeric: tabular-nums;
    border: 2px solid #1E293B;
  }
  .teclado { display: grid; grid-template-columns: repeat(3, 1fr); gap: .7rem; }
  .teclado button {
    font-size: 2rem; padding: 1rem 0; border: none; border-radius: 12px;
    background: #1E293B; color: var(--texto); cursor: pointer;
  }
  .teclado button:active { background: var(--cian); color: var(--bg); }
  .solicitar {
    margin-top: 1.2rem; width: 100%; font-size: 1.5rem; padding: 1.1rem 0;
    border: none; border-radius: 12px; background: var(--cian); color: #06282E;
    font-weight: 800; cursor: pointer;
  }
  #resultado { display: none; }
  .num-turno { font-size: 6rem; font-weight: 800; color: var(--amarillo); font-variant-numeric: tabular-nums; }
  #qr { margin: 1rem auto; background: white; padding: 12px; border-radius: 12px; width: fit-content; }
  .pin { font-size: 1.4rem; color: var(--cian); letter-spacing: .15em; }
  .aviso { color: var(--gris); margin-top: 1rem; font-size: 1rem; }
</style>
</head>
<body>
  <h1>💊 <span id="nombre">Dispensario</span></h1>
  <p class="sub">Toma tu turno: escribe tu número de documento</p>

  <div class="panel" id="formulario">
    <div class="doc" id="doc">&nbsp;</div>
    <div class="teclado">
      <button onclick="tecla('1')">1</button><button onclick="tecla('2')">2</button><button onclick="tecla('3')">3</button>
      <button onclick="tecla('4')">4</button><button onclick="tecla('5')">5</button><button onclick="tecla('6')">6</button>
      <button onclick="tecla('7')">7</button><button onclick="tecla('8')">8</button><button onclick="tecla('9')">9</button>
      <button onclick="borrar()">⌫</button><button onclick="tecla('0')">0</button><button onclick="limpiar()">C</button>
    </div>
    <button class="solicitar" onclick="solicitar()">🎫 Solicitar turno</button>
  </div>

  <div class="panel" id="resultado">
    <p style="font-size:1.3rem;">Tu turno es</p>
    <div class="num-turno" id="turno-num">000</div>
    <div id="qr"></div>
    <p class="pin">PIN: <b id="turno-pin"></b></p>
    <button class="solicitar" id="btn-imprimir" style="display:none;background:var(--amarillo);color:#3B2F04;"
      onclick="imprimirTicket(event)">🖨 Imprimir mi ticket</button>
    <p class="aviso">📱 Escanea el QR con la app para seguir tu turno y adjuntar tu fórmula.<br>
      Observa la pantalla: te llamaremos por este número.</p>
  </div>

  <!-- ⚙ Configuración de impresora (esquina inferior derecha) -->
  <button id="btn-config" onclick="abrirConfigImpresora()"
    style="position:fixed;bottom:10px;right:10px;background:none;border:none;color:#334155;font-size:1.5rem;cursor:pointer;">⚙</button>
  <div class="panel" id="config-impresora" style="display:none;position:fixed;inset:0;margin:auto;height:fit-content;z-index:10;">
    <h1 style="font-size:1.3rem;">🖨 Impresora de tickets</h1>
    <p class="sub" id="imp-estado">…</p>
    <button class="solicitar" style="font-size:1.1rem;" onclick="buscarImpresorasKiosko(this)">🔍 Buscar impresoras en la red</button>
    <div id="imp-lista" style="display:flex;flex-direction:column;gap:.5rem;margin-top:.8rem;"></div>
    <button class="solicitar" style="font-size:1rem;background:#1E293B;color:var(--texto);margin-top:.8rem;"
      onclick="document.getElementById('config-impresora').style.display='none'">Cerrar</button>
  </div>

<script src="/qrcode.min.js"></script>
<script>
const $ = id => document.getElementById(id);
let documento = '';
let timerVolver = null;
let turnoActual = null;
let ticketDisponible = false;

function cargarDisplay() {
  fetch('/api/display').then(r => r.json()).then(d => {
    if (d.nombre_centro) $('nombre').textContent = d.nombre_centro;
    ticketDisponible = !!d.ticket_disponible;
  }).catch(() => {});
}
cargarDisplay();

function pintarDoc() { $('doc').textContent = documento || ' '; }
function tecla(d) { if (documento.length < 15) { documento += d; pintarDoc(); } }
function borrar() { documento = documento.slice(0, -1); pintarDoc(); }
function limpiar() { documento = ''; pintarDoc(); }

async function solicitar() {
  if (documento.length < 3) { alert('Escribe tu número de documento completo'); return; }
  try {
    const r = await fetch('/api/turnos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tipo_documento: 'CC', numero_documento: documento }),
    });
    const t = await r.json();
    if (!r.ok) { alert(t.error || 'No se pudo crear el turno'); return; }
    turnoActual = t;
    $('turno-num').textContent = String(t.numero).padStart(3, '0');
    $('turno-pin').textContent = t.codigo_pin;
    $('qr').innerHTML = '';
    try { new QRCode($('qr'), { text: t.qr_code, width: 180, height: 180 }); } catch (e) {}
    $('btn-imprimir').style.display = ticketDisponible ? 'block' : 'none';
    $('btn-imprimir').textContent = '🖨 Imprimir mi ticket';
    $('formulario').style.display = 'none';
    $('resultado').style.display = 'block';
    clearTimeout(timerVolver);
    timerVolver = setTimeout(volver, 30000);
  } catch (e) {
    alert('Sin conexión con el servidor. Intenta de nuevo.');
  }
}

function volver() {
  documento = '';
  pintarDoc();
  $('resultado').style.display = 'none';
  $('formulario').style.display = 'block';
}
document.body.addEventListener('click', (e) => {
  // Cualquier toque fuera de los paneles vuelve al formulario
  if ($('config-impresora').style.display === 'block') return;
  if ($('resultado').style.display === 'block' && !$('resultado').contains(e.target)
      && e.target.id !== 'btn-config') volver();
});

// ---- Impresión del ticket (impresora térmica por red) ----
async function imprimirTicket(e) {
  e.stopPropagation();
  if (!turnoActual) return;
  clearTimeout(timerVolver);
  timerVolver = setTimeout(volver, 30000);
  $('btn-imprimir').textContent = '🖨 Imprimiendo…';
  try {
    const r = await fetch(`/api/tickets/${turnoActual.id}`, { method: 'POST' });
    const d = await r.json();
    $('btn-imprimir').textContent = r.ok ? '✅ Ticket impreso — toma tu papel' : ('⚠ ' + (d.error || 'Error'));
  } catch (err) {
    $('btn-imprimir').textContent = '⚠ Sin conexión con el servidor';
  }
}

// ---- Selección de impresora en red (queda enlazada en el servidor) ----
async function abrirConfigImpresora() {
  $('config-impresora').style.display = 'block';
  try {
    const imp = await (await fetch('/api/impresora')).json();
    $('imp-estado').textContent = imp.ip
      ? `Impresora enlazada: ${imp.ip}:${imp.puerto}`
      : 'No hay impresora enlazada todavía.';
  } catch (e) { $('imp-estado').textContent = 'Sin conexión con el servidor.'; }
  $('imp-lista').innerHTML = '';
}

async function buscarImpresorasKiosko(boton) {
  boton.disabled = true;
  boton.textContent = '🔍 Buscando… (unos segundos)';
  try {
    const r = await (await fetch('/api/impresoras/buscar', { method: 'POST' })).json();
    $('imp-lista').innerHTML = (r.impresoras && r.impresoras.length)
      ? r.impresoras.map(ip =>
          `<button class="solicitar" style="font-size:1.1rem;" onclick="enlazarImpresora('${ip}')">🖨 ${ip} — usar esta</button>`).join('')
      : '<p class="sub">No se encontraron impresoras en la red (puerto 9100).</p>';
  } catch (e) {
    $('imp-lista').innerHTML = '<p class="sub">Error buscando impresoras.</p>';
  }
  boton.disabled = false;
  boton.textContent = '🔍 Buscar impresoras en la red';
}

async function enlazarImpresora(ip) {
  await fetch('/api/impresora', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ip, puerto: 9100 }),
  });
  $('imp-estado').textContent = `Impresora enlazada: ${ip}:9100 ✓`;
  $('imp-lista').innerHTML = '';
  cargarDisplay();
}
</script>
</body>
</html>
