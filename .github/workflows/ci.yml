# Verificación continua en cada push/PR a main:
# valida la sintaxis del servidor desktop, corre el smoke test de la API
# y compila el APK de debug.
name: CI

on:
  push:
    branches: [main]
    tags-ignore: ["v*"]
  pull_request:
    branches: [main]

jobs:
  desktop:
    name: Desktop (sintaxis + smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Instalar dependencias (sin Electron)
        working-directory: desktop
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: npm ci

      - name: Verificar sintaxis
        working-directory: desktop
        run: |
          node --check src/main.js
          node --check src/server.js
          node --check src/db.js
          node --check src/ocr.js
          node --check src/ticket.js
          node --check ../asistente/src/main.js
          node --check ../asistente/src/preload.js

      - name: Smoke test de API
        working-directory: desktop
        run: node ../.ci/smoke-test.js

  android:
    name: Android (compilación debug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Compilar APKs debug (todos los flavors)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
