<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Conectar — Dispensario Asistente</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
  body {
    background: #F3F6F8; color: #16232E; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .card { background: white; border-radius: 12px; padding: 2rem; width: min(440px, 92vw); box-shadow: 0 2px 10px rgba(0,0,0,.08); }
  h1 { font-size: 1.3rem; margin-bottom: .4rem; }
  p { color: #64748B; font-size: .9rem; margin-bottom: 1.2rem; }
  label { display: block; font-size: .8rem; color: #64748B; margin: .8rem 0 .3rem; }
  input { width: 100%; padding: .6rem; border: 1px solid #DEE6EB; border-radius: 8px; font-size: 1rem; }
  button {
    width: 100%; margin-top: 1rem; padding: .8rem; border: none; border-radius: 8px;
    background: #0E7490; color: white; font-size: 1rem; font-weight: 600; cursor: pointer;
  }
  button.sec { background: #E0F2FE; color: #075985; }
  #msg { margin-top: .8rem; font-size: .85rem; color: #DC2626; min-height: 1.2rem; }
</style>
</head>
<body>
  <div class="card">
    <h1>💊 Dispensario Asistente</h1>
    <p>No se encontró el servidor automáticamente. Verifica que el equipo con
      <b>Turnos Dispensario</b> esté encendido en la misma red, o ingresa su IP
      (aparece en la parte superior del panel de administración).</p>
    <button class="sec" onclick="reintentar(this)">🔄 Buscar servidor de nuevo</button>
    <label>IP del servidor</label>
    <input id="ip" placeholder="192.168.1.8">
    <label>Puerto</label>
    <input id="puerto" type="number" value="3000">
    <button onclick="conectar(this)">Conectar</button>
    <div id="msg"></div>
  </div>
<script>
async function conectar(b) {
  b.disabled = true;
  document.getElementById('msg').textContent = 'Conectando…';
  const ok = await window.asistente.conectar(
    document.getElementById('ip').value.trim(),
    Number(document.getElementById('puerto').value) || 3000);
  if (!ok) document.getElementById('msg').textContent = 'No se pudo conectar. Verifica la IP y la red.';
  b.disabled = false;
}
async function reintentar(b) {
  b.disabled = true;
  document.getElementById('msg').textContent = '🔍 Buscando en la red…';
  const ok = await window.asistente.reintentarDescubrir();
  if (!ok) document.getElementById('msg').textContent = 'No se encontró el servidor. Ingresa la IP manualmente.';
  b.disabled = false;
}
</script>
</body>
</html>
